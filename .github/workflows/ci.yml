name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Lint with Ruff
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        ruff check .

    - name: Test with pytest and require 70% coverage
      env:
        FRONTEND_URL: "http://localhost:3000"
        BACKEND_URL: "http://localhost:8000"
        DATABASE_URL: "sqlite:///./test.db"
        GOOGLE_CLIENT_ID: "dummy"
        GOOGLE_CLIENT_SECRET: "dummy"
        GOOGLE_PROJECT_ID: "dummy"
        JWT_SECRET: "dummy_secret"
        # We also need these if pydantic requires them, or just let them fallback
      run: |
        # Run tests and fail if coverage is under 70%
        # Assumes app/ is the main package directory
        pytest --cov=app --cov-fail-under=70

  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Flyctl
      uses: superfly/flyctl-actions/setup-flyctl@master
      
    - name: Deploy
      run: flyctl deploy --remote-only
      env:
        FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
